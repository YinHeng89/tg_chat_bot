services:
  bot:
    image: yinheng1989/tg-chat-bot:latest
    container_name: tg-chat-bot
    restart: unless-stopped
    ports:
      - "8025:8000"
    environment:
      - WEB_JWT_SECRET=${WEB_JWT_SECRET}
      - MEMOS_API_URL=${MEMOS_API_URL}
      - MEMOS_API_KEY=${MEMOS_API_KEY}
      - TZ=Asia/Shanghai
    volumes:
      - ../../tg_bot_data/data:/app/data
      - ../../tg_bot_data/logs:/app/logs
      - ../../tg_bot_data/workspace:/app/workspace
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
